<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Officer Profile · ATLAS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside id="sidebar"></aside>
    <div class="main">
      <header id="topbar"></header>
      <main id="content" class="content"></main>
    </div>
  </div>

  <script type="module">
    import { bootPage } from './auth.js';
    import { supabase } from './supabase-client.js';
    import { requireAgencyContext } from './agency-context.js';
    import { OfficerSearch } from './officer-search.js';
    import {
      escHtml, escAttr, fmtDate, renderLoading, renderEmpty, renderErrorState,
      showError, scoreClass, outcomeBadge, outcomeLabel, daysBetween,
    } from './error-handler.js';

    const content = document.getElementById('content');
    const { profile } = await bootPage('officer-profile', 'Officer Profile');
    renderLoading(content, 'Loading officer profile…');

    const { agencyId, agency } = await requireAgencyContext(profile, content);
    if (agencyId) await init();

    async function init() {
      const threshold = Number(agency?.min_performance_threshold ?? 80);
      const params = new URLSearchParams(location.search);
      const officerId = params.get('officer_id');

      if (!officerId) { renderPicker(); return; }

      // ---- Load officer + related data --------------------------------
      let officer, reviews, deltaTs, assignments;
      try {
        const [oRes, rRes, dRes] = await Promise.all([
          supabase.from('personnel_roster')
            .select('id, first_name, last_name, badge_number, email, performance_score, officer_status, rank:rank_id (rank_name)')
            .eq('id', officerId).eq('agency_id', agencyId).maybeSingle(),
          supabase.from('bwc_reviews')
            .select(`id, atlas_case_number, review_date, incident_date, kpi_score, follow_up_outcome,
                     incident_type:incident_type_id (name),
                     reviewer:reviewer_id (full_name)`)
            .eq('primary_officer_id', officerId).eq('agency_id', agencyId)
            .order('review_date', { ascending: false }),
          supabase.from('delta_t_cases')
            .select(`id, status, t1_incident_date, t2_training_delivered, t4_verification_date,
                     kpi:kpi_id (kpi_text)`)
            .eq('officer_id', officerId).eq('agency_id', agencyId)
            .order('t1_incident_date', { ascending: false }),
        ]);
        if (oRes.error) throw oRes.error;
        if (rRes.error) throw rRes.error;
        if (dRes.error) throw dRes.error;
        officer = oRes.data;
        reviews = rRes.data || [];
        deltaTs = dRes.data || [];

        if (!officer) {
          renderEmpty(content, 'Officer not found', 'The officer may belong to a different agency, or you may not have access.');
          return;
        }

        const dtIds = deltaTs.map((d) => d.id);
        if (dtIds.length) {
          const { data, error } = await supabase.from('training_assignments')
            .select('id, delta_t_case_id, course, assigned_date, date_delivered')
            .in('delta_t_case_id', dtIds).order('assigned_date', { ascending: false });
          if (error) throw error;
          assignments = data || [];
        } else assignments = [];
      } catch (e) {
        showError(e, 'Officer profile');
        renderErrorState(content);
        return;
      }

      // ---- Derived stats ----------------------------------------------
      const score = officer.performance_score === null ? null : Number(officer.performance_score);
      const openDT = deltaTs.filter((d) => d.status === 'open');
      const scored = reviews.filter((r) => r.kpi_score !== null);

      // Outcome distribution
      const outcomes = {};
      reviews.forEach((r) => { const k = r.follow_up_outcome || 'no_action'; outcomes[k] = (outcomes[k] || 0) + 1; });

      // Score by incident type
      const byType = {};
      scored.forEach((r) => {
        const name = r.incident_type?.name || 'Unknown';
        (byType[name] ||= []).push(Number(r.kpi_score));
      });
      const typeRows = Object.entries(byType)
        .map(([name, arr]) => ({ name, n: arr.length, avg: arr.reduce((a, b) => a + b, 0) / arr.length }))
        .sort((a, b) => a.avg - b.avg);

      // Score trend (chronological) for the sparkline
      const trend = [...scored].sort((a, b) => new Date(a.review_date) - new Date(b.review_date))
        .map((r) => Number(r.kpi_score));

      const statusPill = {
        active: 'pill pill-success', on_leave: 'pill pill-warning',
        inactive: 'pill', terminated: 'pill pill-danger',
      }[officer.officer_status] || 'pill';

      // ---- Render ------------------------------------------------------
      content.innerHTML = `
        <div class="card">
          <div class="flex-between" style="flex-wrap:wrap; gap:16px;">
            <div style="display:flex; align-items:center; gap:20px;">
              ${gaugeSVG(score, threshold)}
              <div>
                <h2 class="card-title mb-0">${escHtml(officer.last_name)}, ${escHtml(officer.first_name)}</h2>
                <p class="text-secondary" style="margin:4px 0;">
                  Badge #${escHtml(officer.badge_number || '—')} · ${escHtml(officer.rank?.rank_name || 'Unranked')}
                </p>
                <span class="${statusPill}">${escHtml(officer.officer_status.replace('_', ' '))}</span>
                ${officer.email ? `<p class="text-muted" style="margin:6px 0 0;">${escHtml(officer.email)}</p>` : ''}
              </div>
            </div>
            <div class="stat-grid" style="margin:0; min-width:340px;">
              <div class="stat"><div class="stat-value">${reviews.length}</div><div class="stat-label">Total Reviews</div></div>
              <div class="stat ${openDT.length ? 'warning' : ''}"><div class="stat-value">${openDT.length}</div><div class="stat-label">Open Delta T</div></div>
              <div class="stat ${score !== null && score < threshold ? 'danger' : 'success'}">
                <div class="stat-value">${score === null ? '—' : score.toFixed(1) + '%'}</div>
                <div class="stat-label">Score vs ${threshold}% floor</div>
              </div>
            </div>
          </div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
          <div class="card">
            <h3 class="card-title">Score Trend</h3>
            ${trend.length >= 2 ? sparkSVG(trend, threshold) : '<p class="text-muted">Not enough scored reviews to plot a trend.</p>'}
          </div>
          <div class="card">
            <h3 class="card-title">Outcome Distribution</h3>
            ${reviews.length ? barsHTML(outcomes, reviews.length) : '<p class="text-muted">No reviews yet.</p>'}
          </div>
        </div>

        <div class="card" style="margin-top:20px;">
          <h3 class="card-title">Score by Incident Type</h3>
          ${typeRows.length ? `
            <div class="table-wrap"><table class="data">
              <thead><tr><th>Incident Type</th><th>Reviews</th><th>Avg Score</th></tr></thead>
              <tbody>${typeRows.map((t) => `
                <tr>
                  <td>${escHtml(t.name)}</td>
                  <td>${t.n}</td>
                  <td><span class="${scoreClass(t.avg, threshold)}">${t.avg.toFixed(1)}%</span></td>
                </tr>`).join('')}
              </tbody></table></div>` : '<p class="text-muted">No scored reviews yet.</p>'}
        </div>

        <div class="card" style="margin-top:20px;">
          <div class="flex-between">
            <h3 class="card-title mb-0">Review History</h3>
            <span class="text-muted">${reviews.length} record${reviews.length === 1 ? '' : 's'}</span>
          </div>
          <div id="review-history" style="margin-top:12px;"></div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;">
          <div class="card">
            <h3 class="card-title">Delta T Cases</h3>
            <div id="dt-list"></div>
          </div>
          <div class="card">
            <h3 class="card-title">Training Assignments</h3>
            <div id="ta-list"></div>
          </div>
        </div>
      `;

      // Review history table
      const rh = document.getElementById('review-history');
      if (!reviews.length) {
        renderEmpty(rh, 'No reviews', 'This officer has not been reviewed yet.');
      } else {
        rh.innerHTML = `
          <div class="table-wrap"><table class="data">
            <thead><tr><th>Case #</th><th>Review Date</th><th>Incident Type</th><th>Score</th><th>Outcome</th><th>Reviewer</th></tr></thead>
            <tbody>${reviews.map((r) => `
              <tr class="rowlink" data-id="${escAttr(r.id)}">
                <td>${escHtml(r.atlas_case_number || '—')}</td>
                <td>${fmtDate(r.review_date)}</td>
                <td>${escHtml(r.incident_type?.name || '—')}</td>
                <td>${r.kpi_score === null ? '—' : `<span class="${scoreClass(r.kpi_score, threshold)}">${Number(r.kpi_score).toFixed(1)}%</span>`}</td>
                <td>${outcomeBadge(r.follow_up_outcome)}</td>
                <td>${escHtml(r.reviewer?.full_name || '—')}</td>
              </tr>`).join('')}
            </tbody></table></div>`;
        rh.querySelectorAll('tr.rowlink').forEach((tr) => {
          tr.addEventListener('click', () => {
            location.href = `review-detail.html?id=${encodeURIComponent(tr.dataset.id)}${suffix()}`;
          });
        });
      }

      // Delta T list
      const dtEl = document.getElementById('dt-list');
      if (!deltaTs.length) {
        renderEmpty(dtEl, 'No Delta T cases', 'No interventions on record for this officer.');
      } else {
        dtEl.innerHTML = `
          <div class="table-wrap"><table class="data">
            <thead><tr><th>KPI</th><th>Status</th><th>T1</th><th>Age / Δ</th></tr></thead>
            <tbody>${deltaTs.map((d) => {
              const days = d.status === 'open'
                ? daysBetween(d.t1_incident_date, new Date().toISOString())
                : daysBetween(d.t1_incident_date, d.t4_verification_date);
              const flagged = d.status === 'open' && days !== null && days >= 90;
              return `
              <tr class="rowlink" data-id="${escAttr(d.id)}">
                <td>${escHtml(d.kpi?.kpi_text || '—')}</td>
                <td><span class="pill ${d.status === 'open' ? (flagged ? 'pill-danger' : 'pill-warning') : 'pill-success'}">${flagged ? 'flagged 90+' : escHtml(d.status)}</span></td>
                <td>${fmtDate(d.t1_incident_date)}</td>
                <td>${days === null ? '—' : days + 'd'}</td>
              </tr>`;
            }).join('')}
            </tbody></table></div>`;
        dtEl.querySelectorAll('tr.rowlink').forEach((tr) => {
          tr.addEventListener('click', () => {
            location.href = `delta-t-detail.html?id=${encodeURIComponent(tr.dataset.id)}${suffix()}`;
          });
        });
      }

      // Training assignments list
      const taEl = document.getElementById('ta-list');
      if (!assignments.length) {
        renderEmpty(taEl, 'No training assignments', 'No courses assigned via Delta T for this officer.');
      } else {
        taEl.innerHTML = `
          <div class="table-wrap"><table class="data">
            <thead><tr><th>Course</th><th>Assigned</th><th>Delivered</th></tr></thead>
            <tbody>${assignments.map((a) => `
              <tr>
                <td>${escHtml(a.course || '—')}</td>
                <td>${fmtDate(a.assigned_date)}</td>
                <td>${a.date_delivered ? `<span class="pill pill-success">${fmtDate(a.date_delivered)}</span>` : '<span class="pill pill-warning">pending</span>'}</td>
              </tr>`).join('')}
            </tbody></table></div>`;
      }
    }

    // Preserve super_admin agency context on outbound links.
    function suffix() {
      const a = new URLSearchParams(location.search).get('agency_id');
      return a && profile.role === 'super_admin' ? `&agency_id=${encodeURIComponent(a)}` : '';
    }

    // ---- No officer_id: show an officer picker -------------------------
    function renderPicker() {
      content.innerHTML = `
        <div class="card" style="max-width:560px; margin:48px auto;">
          <h2 class="card-title">Officer Profile</h2>
          <p class="text-secondary">Search for an officer to open their full performance profile.</p>
          <div id="picker"></div>
        </div>`;
      new OfficerSearch(document.getElementById('picker'), {
        agencyId,
        supervisorId: profile.role === 'supervisor' ? profile.id : null,
        activeOnly: false,
        placeholder: 'Search by name or badge number…',
        onSelect: (officer) => {
          if (!officer) return; // cleared
          const params = new URLSearchParams(location.search);
          params.set('officer_id', officer.id);
          location.search = params.toString();
        },
      });
    }

    // ---- Inline SVG score gauge ----------------------------------------
    function gaugeSVG(score, threshold) {
      const size = 108, stroke = 10, r = (size - stroke) / 2, c = size / 2;
      const circ = 2 * Math.PI * r;
      const pct = score === null ? 0 : Math.max(0, Math.min(100, score)) / 100;
      const cls = scoreClass(score, threshold);
      const color = cls === 'score-good' ? 'var(--success)' : cls === 'score-warn' ? 'var(--warning)' : cls === 'score-bad' ? 'var(--danger)' : 'var(--border)';
      return `
        <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="Performance score gauge">
          <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${stroke}" opacity="0.4"/>
          <circle cx="${c}" cy="${c}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}"
            stroke-linecap="round" stroke-dasharray="${(circ * pct).toFixed(1)} ${circ.toFixed(1)}"
            transform="rotate(-90 ${c} ${c})"/>
          <text x="${c}" y="${c + 1}" text-anchor="middle" dominant-baseline="middle"
            font-size="22" font-weight="700" fill="currentColor">${score === null ? '—' : Math.round(score)}</text>
          <text x="${c}" y="${c + 20}" text-anchor="middle" font-size="10" fill="var(--text-muted)">${score === null ? 'no data' : 'score'}</text>
        </svg>`;
    }

    // ---- Inline SVG sparkline with threshold line ----------------------
    function sparkSVG(values, threshold) {
      const w = 460, h = 120, pad = 10;
      const min = Math.min(...values, threshold) - 5;
      const max = Math.max(...values, 100);
      const x = (i) => pad + (i * (w - pad * 2)) / Math.max(values.length - 1, 1);
      const y = (v) => h - pad - ((v - min) * (h - pad * 2)) / Math.max(max - min, 1);
      const pts = values.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(' ');
      const ty = y(threshold).toFixed(1);
      return `
        <svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto;" role="img" aria-label="Score trend">
          <line x1="${pad}" y1="${ty}" x2="${w - pad}" y2="${ty}" stroke="var(--danger)" stroke-dasharray="4 4" opacity="0.6"/>
          <text x="${w - pad}" y="${Number(ty) - 4}" text-anchor="end" font-size="10" fill="var(--text-muted)">${threshold}% floor</text>
          <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
          ${values.map((v, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(v).toFixed(1)}" r="3" fill="var(--accent)"><title>${v.toFixed(1)}%</title></circle>`).join('')}
        </svg>
        <p class="text-muted" style="margin:4px 0 0;">Chronological KPI scores, oldest → newest (${values.length} reviews).</p>`;
    }

    // ---- Horizontal outcome distribution bars --------------------------
    function barsHTML(outcomes, total) {
      const order = ['no_action', 'commendation', 'coaching', 'training', 'internal_affairs', 'pip'];
      const colors = {
        no_action: 'var(--text-muted)', commendation: 'var(--success)', coaching: 'var(--accent)',
        training: 'var(--warning)', internal_affairs: 'var(--danger)', pip: 'var(--danger)',
      };
      return order.filter((k) => outcomes[k]).map((k) => {
        const n = outcomes[k];
        const pct = ((n / total) * 100).toFixed(0);
        return `
          <div style="margin-bottom:10px;">
            <div class="flex-between" style="font-size:13px; margin-bottom:3px;">
              <span>${escHtml(outcomeLabel(k))}</span><span class="text-muted">${n} (${pct}%)</span>
            </div>
            <div style="background:var(--bg-elevated); border-radius:6px; height:10px; overflow:hidden;">
              <div style="width:${pct}%; height:100%; background:${colors[k]}; border-radius:6px;"></div>
            </div>
          </div>`;
      }).join('');
    }
  </script>
</body>
</html>
