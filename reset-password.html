<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password · ATLAS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-mark"><img src="atlas-logo.png" alt="ATLAS" /></div>
        <div>
          <div class="auth-title">ATLAS</div>
          <div class="auth-sub">Choose a new password</div>
        </div>
      </div>
      <div class="form-row">
        <label class="field-label" for="pw1">New password</label>
        <input type="password" id="pw1" autocomplete="new-password" />
      </div>
      <div class="form-row">
        <label class="field-label" for="pw2">Confirm new password</label>
        <input type="password" id="pw2" autocomplete="new-password" />
      </div>
      <button class="btn btn-primary" id="save-btn" style="width:100%;">Set new password</button>
      <p style="text-align:center;margin:14px 0 0;font-size:13px;"><a href="login.html">Back to sign in</a></p>
    </div>
  </div>

  <script type="module">
    // Supabase's recovery link lands here with a session (detectSessionInUrl).
    import { supabase } from './supabase-client.js';
    import { toast, showError } from './error-handler.js';

    const btn = document.getElementById('save-btn');
    btn.addEventListener('click', async () => {
      const pw1 = document.getElementById('pw1').value;
      const pw2 = document.getElementById('pw2').value;
      if (pw1.length < 8) { toast('Password must be at least 8 characters.', 'error'); return; }
      if (pw1 !== pw2) { toast('Passwords do not match.', 'error'); return; }
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) throw new Error('Recovery session expired — request a new reset link.');
        const { error } = await supabase.auth.updateUser({ password: pw1 });
        if (error) throw error;
        toast('Password updated. Redirecting to sign in…');
        setTimeout(() => (location.href = 'login.html'), 1400);
      } catch (e) {
        showError(e, 'Could not update password');
        btn.disabled = false; btn.textContent = 'Set new password';
      }
    });
  </script>
</body>
</html>
