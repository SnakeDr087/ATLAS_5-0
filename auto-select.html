<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auto Select · ATLAS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside id="sidebar"></aside>
    <div class="main">
      <header id="topbar"></header>
      <main id="content" class="content"></main>
    </div>
  </div>

  <script type="module">
    // The defensibility engine. Weighted stochastic sampling over the
    // supervisor's roster, with a PERMANENT audit receipt for every run —
    // eliminating claims of targeting.
    import { bootPage } from './auth.js';
    import { supabase, logActivity, getEffectiveContent } from './supabase-client.js';
    import { resolveAgencyId } from './agency-context.js';
    import {
      escHtml, escAttr, fmtDate, fmtDateTime, renderLoading, renderEmpty,
      renderErrorState, showError, toast, scoreClass,
    } from './error-handler.js';

    const content = document.getElementById('content');
    const { profile } = await bootPage('auto-select', 'Auto Select');
    const agencyId = resolveAgencyId(profile); // supervisors always have one
    renderLoading(content, 'Building selection pool…');

    // ---- Tier logic (the defensible formula, stated verbatim on receipts) ----
    function getTier(score, count) {
      if ((score !== null && score < 80) || count > 40) return { tier: 'critical', weight: 4 };
      if ((score !== null && score < 90) || count > 25) return { tier: 'elevated', weight: 2 };
      return { tier: 'standard', weight: 1 };
    }

    // Incident sets per tier — drawn from the agency's EFFECTIVE incident types.
    const TIER_SETS = {
      critical: ['Use of Force', 'Vehicle Pursuit', 'K-9 Deployment', 'Search Warrant Service', 'Domestic Violence', 'Mental Health Crisis'],
      elevated: ['DUI Investigation', 'Foot Pursuit', 'Arrest', 'Robbery Response', 'Domestic Violence'],
      standard: ['Traffic Stop', 'Field Interview', 'Crash Investigation', 'Disturbance / Disorderly', 'Burglary Response', 'Juvenile Contact'],
    };

    let pool = [], excludedAll = false, incidentTypes = [];
    let sortBy = 'tier', q = '', showAllReceipts = false; // declared BEFORE the boot try-block calls render()/loadReceipts()

    try {
      const cutoff = new Date(Date.now() - 30 * 86400000).toISOString().slice(0, 10);

      const [{ data: roster, error: rErr }, types] = await Promise.all([
        supabase.from('supervisor_rosters')
          .select('officer_id, personnel_roster:officer_id (id, first_name, last_name, badge_number, performance_score, officer_status, agency_ranks:rank_id (rank_name))')
          .eq('supervisor_id', profile.id),
        getEffectiveContent('incident_type', agencyId),
      ]);
      if (rErr) throw rErr;
      incidentTypes = types;

      const officers = (roster || []).map((x) => x.personnel_roster).filter((o) => o && o.officer_status === 'active');
      if (!officers.length) {
        renderEmpty(content, 'Your roster is empty', 'Attach officers on the Roster page before running Auto Select.');
        throw new Error('empty roster');
      }

      const ids = officers.map((o) => o.id);
      const [{ data: allRevs }, { data: recentRevs }] = await Promise.all([
        supabase.from('bwc_reviews').select('primary_officer_id').eq('status', 'approved').in('primary_officer_id', ids),
        supabase.from('bwc_reviews').select('primary_officer_id').eq('status', 'approved')
          .in('primary_officer_id', ids).gte('review_date', cutoff),
      ]);
      const counts = {}, recent = new Set();
      (allRevs || []).forEach((r) => { counts[r.primary_officer_id] = (counts[r.primary_officer_id] || 0) + 1; });
      (recentRevs || []).forEach((r) => recent.add(r.primary_officer_id));

      pool = officers.map((o) => {
        const count = counts[o.id] || 0;
        const t = getTier(o.performance_score === null ? null : Number(o.performance_score), count);
        return { ...o, reviewCount: count, ...t, excluded: recent.has(o.id) };
      });

      // If ALL officers were reviewed in the last 30 days, the window resets.
      excludedAll = pool.every((o) => o.excluded);
      if (excludedAll) pool.forEach((o) => (o.excluded = false));

      render();
      await loadReceipts();
    } catch (e) {
      if (e.message !== 'empty roster') { showError(e, 'Auto Select'); renderErrorState(content); }
    }

    function render() {
      const eligible = pool.filter((o) => !o.excluded);
      const excluded = pool.filter((o) => o.excluded);
      const totalWeight = eligible.reduce((s, o) => s + o.weight, 0);

      content.innerHTML = `
        ${excludedAll ? `<div class="notice notice-warning" style="margin-bottom:16px;">Every officer on your roster was reviewed within the last 30 days — the exclusion window has reset and all officers are eligible again.</div>` : ''}
        <div class="card" style="border-left:4px solid var(--accent);">
          <div class="flex-between" style="flex-wrap:wrap;gap:10px;">
            <div class="stat-grid mb-0" style="flex:1;min-width:300px;">
              <div class="stat"><div class="stat-value">${pool.length}</div><div class="stat-label">On roster</div></div>
              <div class="stat success"><div class="stat-value">${eligible.length}</div><div class="stat-label">Eligible</div></div>
              <div class="stat ${excluded.length ? 'warning' : ''}"><div class="stat-value">${excluded.length}</div><div class="stat-label">Excluded (30-day)</div></div>
              <div class="stat"><div class="stat-value">${totalWeight}</div><div class="stat-label">Total weight</div></div>
            </div>
            <button class="btn btn-primary" id="run-btn" ${eligible.length ? '' : 'disabled'}>Run Auto Select</button>
          </div>
        </div>
        <div id="result"></div>

        <div class="card">
          <div class="flex-between" style="flex-wrap:wrap;gap:10px;">
            <h2 class="card-title mb-0">Selection pool</h2>
            <div class="filter-bar" style="margin:0;">
              <input id="pool-q" placeholder="Search officer…" value="${escAttr(q)}" style="width:180px;"/>
              <select id="pool-sort">
                <option value="tier" ${sortBy === 'tier' ? 'selected' : ''}>Sort: tier (highest weight)</option>
                <option value="score" ${sortBy === 'score' ? 'selected' : ''}>Sort: score (lowest first)</option>
                <option value="name" ${sortBy === 'name' ? 'selected' : ''}>Sort: name</option>
                <option value="reviews" ${sortBy === 'reviews' ? 'selected' : ''}>Sort: review count</option>
              </select>
            </div>
          </div>
          <div id="pool-table" style="margin-top:10px;"></div>
        </div>

        <div class="card">
          <h2 class="card-title">Past selection receipts <span class="pill">permanent audit trail</span></h2>
          <div id="receipts"></div>
        </div>`;

      document.getElementById('run-btn')?.addEventListener('click', run);
      document.getElementById('pool-q').addEventListener('input', (e) => { q = e.target.value; paintPool(); });
      document.getElementById('pool-sort').addEventListener('change', (e) => { sortBy = e.target.value; paintPool(); });
      paintPool();
    }

    function paintPool() {
      const el = document.getElementById('pool-table');
      const tierPill = { critical: 'pill-danger', elevated: 'pill-warning', standard: 'pill-success' };
      const tierRank = { critical: 0, elevated: 1, standard: 2 };
      const needle = q.trim().toLowerCase();

      const match = (o) => !needle ||
        `${o.first_name} ${o.last_name} ${o.badge_number || ''}`.toLowerCase().includes(needle);
      const sorters = {
        tier: (a, b) => tierRank[a.tier] - tierRank[b.tier] || (a.performance_score ?? 999) - (b.performance_score ?? 999),
        score: (a, b) => (a.performance_score ?? 999) - (b.performance_score ?? 999),
        name: (a, b) => `${a.last_name} ${a.first_name}`.localeCompare(`${b.last_name} ${b.first_name}`),
        reviews: (a, b) => b.reviewCount - a.reviewCount,
      };

      const eligible = pool.filter((o) => !o.excluded && match(o)).sort(sorters[sortBy]);
      const excluded = pool.filter((o) => o.excluded && match(o)).sort(sorters[sortBy]);

      const row = (o) => `
        <tr ${o.excluded ? 'style="opacity:.55;"' : ''}>
          <td><strong>${escHtml(o.last_name)}, ${escHtml(o.first_name)}</strong>
            <span class="text-muted">#${escHtml(o.badge_number || '—')}</span>
            <div class="text-muted" style="font-size:11.5px;">${escHtml(o.agency_ranks?.rank_name || 'Unranked')}</div></td>
          <td><span class="${scoreClass(o.performance_score)}">${o.performance_score ?? '—'}${o.performance_score !== null ? '%' : ''}</span></td>
          <td>${o.reviewCount}</td>
          <td><span class="pill ${tierPill[o.tier]}">${escHtml(o.tier)}</span></td>
          <td>${o.weight}×</td>
          <td>${o.excluded
            ? '<span class="pill">excluded — reviewed &lt; 30 days</span>'
            : '<span class="pill pill-success">eligible</span>'}</td>
        </tr>`;

      const head = `<thead><tr><th>Officer</th><th>Score</th><th>Reviews</th><th>Tier</th><th>Weight</th><th>Status</th></tr></thead>`;

      el.innerHTML = `
        ${eligible.length ? `
          <div class="table-wrap"><table class="data">${head}<tbody>${eligible.map(row).join('')}</tbody></table></div>`
          : '<p class="text-muted">No eligible officers match.</p>'}
        ${excluded.length ? `
          <div style="margin-top:12px;">
            <button type="button" class="btn btn-secondary btn-sm" id="toggle-excluded">
              ${excluded.length} excluded (reviewed in last 30 days) — <span id="toggle-word">show</span>
            </button>
            <div id="excluded-wrap" hidden style="margin-top:8px;">
              <div class="table-wrap"><table class="data">${head}<tbody>${excluded.map(row).join('')}</tbody></table></div>
            </div>
          </div>` : ''}`;

      document.getElementById('toggle-excluded')?.addEventListener('click', () => {
        const w = document.getElementById('excluded-wrap');
        w.hidden = !w.hidden;
        document.getElementById('toggle-word').textContent = w.hidden ? 'show' : 'hide';
      });
    }

    async function run() {
      const btn = document.getElementById('run-btn');
      btn.disabled = true; btn.textContent = 'Selecting…';
      try {
        const eligible = pool.filter((o) => !o.excluded);
        const totalWeight = eligible.reduce((s, o) => s + o.weight, 0);

        // Weighted stochastic sampling.
        let roll = Math.random() * totalWeight, picked = eligible[eligible.length - 1];
        for (const o of eligible) { roll -= o.weight; if (roll <= 0) { picked = o; break; } }

        // Incident type drawn from the selected officer's TIER incident set.
        const setNames = TIER_SETS[picked.tier];
        let tierTypes = incidentTypes.filter((t) => setNames.includes(t.name));
        if (!tierTypes.length) tierTypes = incidentTypes; // agency customized names — fall back to full effective list
        const incident = tierTypes[Math.floor(Math.random() * tierTypes.length)];

        const probability = Math.round((picked.weight / totalWeight) * 1000) / 10;
        const methodology =
`ATLAS Auto Select — weighted stochastic sampling
Run by: ${profile.full_name} (${profile.email})
Pool: ${eligible.length} eligible officers (of ${pool.length} on roster; officers with an approved review in the prior 30 days excluded${excludedAll ? '; window had fully reset' : ''}).
Tier formula: critical if score < 80 or review count > 40 (weight 4x); elevated if score < 90 or count > 25 (weight 2x); otherwise standard (weight 1x).
Selected officer: ${picked.last_name}, ${picked.first_name} (#${picked.badge_number || '—'}) — tier ${picked.tier}, weight ${picked.weight}.
Total pool weight: ${totalWeight}. Selection probability: ${picked.weight}/${totalWeight} = ${probability}%.
Incident type drawn uniformly from the ${picked.tier} tier incident set: ${incident?.name || 'n/a'}.
Method: single draw, uniform random number scaled to cumulative weights (client-side CSPRNG-equivalent Math.random).`;

        const { data: receipt, error } = await supabase.from('auto_select_receipts').insert({
          agency_id: agencyId, supervisor_id: profile.id, officer_id: picked.id,
          incident_type_id: incident?.id || null, incident_type_name: incident?.name || null,
          priority_level: picked.tier, selection_weight: picked.weight,
          methodology_notes: methodology,
        }).select('id, created_at').single();
        if (error) throw error;

        await logActivity(profile, 'auto_select_run', 'auto_select_receipt', receipt.id,
          { officer_id: picked.id, tier: picked.tier, incident_type: incident?.name });

        document.getElementById('result').innerHTML = `
          <div class="card" style="border:2px solid var(--success);">
            <h2 class="card-title">Selection result</h2>
            <div class="flex-between" style="margin-bottom:12px;">
              <div>
                <div style="font-family:var(--font-heading);font-size:22px;font-weight:700;">${escHtml(picked.last_name)}, ${escHtml(picked.first_name)} <span class="text-muted">#${escHtml(picked.badge_number || '—')}</span></div>
                <div class="text-secondary">Incident type to review: <strong>${escHtml(incident?.name || '—')}</strong> · tier ${escHtml(picked.tier)} · ${picked.weight}× weight</div>
              </div>
              <a class="btn btn-primary" href="review-new.html?officer_id=${escAttr(picked.id)}&incident_type_id=${escAttr(incident?.id || '')}&receipt_id=${escAttr(receipt.id)}">Start review</a>
            </div>
            <label class="field-label">Audit receipt (permanent)</label>
            <pre style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;font-size:12px;white-space:pre-wrap;margin:0;">${escHtml(methodology)}</pre>
          </div>`;
        toast('Selection recorded — receipt is permanent.');
        await loadReceipts();
      } catch (e) {
        showError(e, 'Auto Select run');
      } finally {
        btn.disabled = false; btn.textContent = 'Run Auto Select';
      }
    }

    async function loadReceipts() {
      const box = document.getElementById('receipts');
      if (!box) return;
      renderLoading(box, 'Loading receipts…');
      try {
        const { data, error } = await supabase.from('auto_select_receipts')
          .select('id, created_at, priority_level, selection_weight, incident_type_name, personnel_roster:officer_id (first_name, last_name, badge_number)')
          .eq('supervisor_id', profile.id).order('created_at', { ascending: false })
          .limit(showAllReceipts ? 1000 : 10);
        if (error) throw error;
        if (!data?.length) { renderEmpty(box, 'No selections yet', 'Your first Auto Select run will be recorded here permanently.'); return; }
        box.innerHTML = `
          <table class="data"><thead><tr><th>When</th><th>Officer</th><th>Incident type</th><th>Tier</th><th>Weight</th></tr></thead>
          <tbody>${data.map((r) => `
            <tr>
              <td>${fmtDateTime(r.created_at)}</td>
              <td>${escHtml(r.personnel_roster?.last_name || '')}, ${escHtml(r.personnel_roster?.first_name || '')} <span class="text-muted">#${escHtml(r.personnel_roster?.badge_number || '')}</span></td>
              <td>${escHtml(r.incident_type_name || '—')}</td>
              <td><span class="pill">${escHtml(r.priority_level || '—')}</span></td>
              <td>${escHtml(String(r.selection_weight ?? '—'))}×</td>
            </tr>`).join('')}</tbody></table>
          ${data.length >= 10 || showAllReceipts ? `<div style="margin-top:10px;"><button type="button" class="btn btn-secondary btn-sm" id="receipts-toggle">${showAllReceipts ? 'Show last 10' : 'View all receipts'}</button></div>` : ''}`;
        document.getElementById('receipts-toggle')?.addEventListener('click', () => { showAllReceipts = !showAllReceipts; loadReceipts(); });
      } catch (e) {
        showError(e, 'Receipts');
        renderErrorState(box);
      }
    }
  </script>
</body>
</html>
