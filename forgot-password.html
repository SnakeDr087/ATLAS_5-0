<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password · ATLAS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand-mark">A</div>
        <div>
          <div class="auth-title">ATLAS</div>
          <div class="auth-sub">Password reset</div>
        </div>
      </div>
      <p class="text-secondary" style="margin-top:0;">Enter your account email. We'll send a reset link that returns you to ATLAS to choose a new password.</p>
      <div class="form-row">
        <label class="field-label" for="email">Email</label>
        <input type="email" id="email" autocomplete="username" />
      </div>
      <button class="btn btn-primary" id="send-btn" style="width:100%;">Send reset link</button>
      <p style="text-align:center;margin:14px 0 0;font-size:13px;"><a href="login.html">Back to sign in</a></p>
    </div>
  </div>

  <script type="module">
    import { supabase } from './supabase-client.js';
    import { toast, showError } from './error-handler.js';

    const btn = document.getElementById('send-btn');
    btn.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) { toast('Enter your email.', 'error'); return; }
      btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: location.origin + location.pathname.replace('forgot-password.html', 'reset-password.html'),
        });
        if (error) throw error;
        toast('Reset link sent. Check your inbox.');
        btn.textContent = 'Link sent';
      } catch (e) {
        showError(e, 'Could not send reset link');
        btn.disabled = false; btn.textContent = 'Send reset link';
      }
    });
  </script>
</body>
</html>
